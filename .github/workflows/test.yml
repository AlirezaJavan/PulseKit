name: Test

on:
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    # macOS is required, not just convenient: pulsekit-* modules declare iosArm64/
    # iosSimulatorArm64 targets, and Kotlin/Native can only compile Apple targets on a macOS host.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build, run unit tests, and check API surface
        # `build` covers what `main` merges need: compiles every module for every target
        # (Android + both iOS targets), runs testAndroidHostTest (including the
        # Robolectric-backed pulsekit-core suite), and apiCheck (binary-compatibility-validator).
        run: ./gradlew build --stacktrace
